name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build workflows
        run: make workflow

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Deepl-Translate.alfredworkflow
            Deepl-Translate.alfred5workflow
